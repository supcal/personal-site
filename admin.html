<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>本地内容管理后台</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <nav class="nav">
          <a class="brand" href="index.html">
            <strong>本地内容管理后台</strong>
            <span>Local visual admin for GitHub Pages</span>
          </a>
          <div class="nav-links">
            <a href="index.html">预览网站</a>
            <button id="save-site" class="button-primary" type="button">保存全部内容</button>
            <button id="logout-admin" type="button">退出登录</button>
          </div>
        </nav>
      </header>
      <main class="main">
        <p class="status">这个后台只在本地开发服务中保存数据。公开部署到 GitHub Pages 时，访客看不到保存接口。</p>
        <div class="admin-layout">
          <aside class="admin-menu" id="admin-menu"></aside>
          <section class="admin-panel" id="admin-app">正在加载...</section>
        </div>
      </main>
    </div>
    <script src="admin.js"></script>
  </body>
</html>
